name: Scheduled cutoff ingestion

# Phase 6: refresh the bundled dataset on a schedule. Runs `ingest.run(mode=latest)`
# (each adapter attempts a live pull, falling back to its cached snapshot), then
# commits the regenerated Parquet + freshness sidecar if anything changed.

on:
  schedule:
    - cron: "0 2 * * 1"   # 02:00 UTC every Monday
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh dataset (live, falls back to cached per source)
        run: python -m cutoffs.ingest --mode latest

      - name: Commit if the dataset changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/cutoffs.parquet data/dataset_meta.json
          if git diff --cached --quiet; then
            echo "No dataset changes."
          else
            git commit -m "chore(data): scheduled cutoff refresh"
            git push
          fi
